<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="./assets/images/Aperture.png" type="image/x-icon">
    
    <title>Home | Github Issue Tracker</title>
    
    <!-- FontAwesome Icons CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/custom.css">

</head>
<!-- <body class="bg-[#F8FAFC]"> -->
<body class="bg-[#f5f5f5]">
    <header class="sticky top-0 bg-white shadow-sm z-50">
        <div class="navbar w-11/12 lg:w-10/12 mx-auto">
            <div class="navbar-start">
                <a href="/index.html" class="flex items-center gap-1">
                    <img class="max-h-9" src="./assets/images/github-logo.png" alt="">
                    <span class="text-2xl font-semibold hidden lg:block">GitHub Issues Tracker</span>
                </a>
            </div>
            <div id="search-box" class="min-w-[300px] text-center hidden md:block">
                <label class="input input-bordered flex items-center gap-2">
                    <input id="input-search" type="search" required placeholder="Search issues..." />
                    <button id="btn-search" class=""><i class="fa-solid fa-magnifying-glass"></i></button>
                </label>
            </div>
            <div class="navbar-end">
                <a href="#" class="btn btn-primary">+ New Issue</a>
            </div>
        </div>
    </header>
    <main id="main" class="py-10">
        Main Section
    </main>

    <footer class="bg-white">
        <div class="navbar w-11/12 lg:w-10/12 mx-auto">
            <div class="navbar-start">
                <a href="/index.html" class="flex items-center gap-1">
                    <img class="max-h-9" src="./assets/images/github-logo.png" alt="">
                    <span class="text-2xl font-semibold hidden lg:block">GitHub Issues Tracker</span>
                </a>
            </div>
            <div id="search-box" class="min-w-[300px] text-center hidden md:block">
                <label class="input input-bordered flex items-center gap-2">
                    <input id="input-search" type="search" required placeholder="Search issues..." />
                    <button id="btn-search" class=""><i class="fa-solid fa-magnifying-glass"></i></button>
                </label>
            </div>
            <div class="navbar-end">
                <a href="#" class="btn btn-primary">+ New Issue</a>
            </div>
        </div>
    </footer>

    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/main.js"></script>
</body>
</html>
