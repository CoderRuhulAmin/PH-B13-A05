<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="shortcut icon" href="./assets/images/Aperture.png" type="image/x-icon">
    
    <title>Home | Github Issue Tracker</title>
    
    <!-- FontAwesome Icons CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/custom.css">

</head>
<!-- <body class="bg-[#F8FAFC]"> -->
<body class="bg-[#f5f5f5]">
    <header class="sticky top-0 bg-white shadow-sm z-50">
        <div class="navbar w-11/12 lg:w-10/12 mx-auto">
            <div class="navbar-start">
                <a href="/index.html" class="flex items-center gap-1">
                    <img class="max-h-9" src="./assets/images/github-logo.png" alt="">
                    <span class="text-2xl font-semibold hidden lg:block">GitHub Issues Tracker</span>
                </a>
            </div>
            <div id="search-box" class="min-w-[300px] text-center hidden md:block">
                <label class="input input-bordered flex items-center gap-2">
                    <input id="input-search" type="search" required placeholder="Search issues..." />
                    <button id="btn-search" class="cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></button>
                </label>
            </div>
            <div class="navbar-end">
                <a href="#" class="btn btn-primary">+ New Issue</a>
            </div>
        </div>
    </header>
    <main id="main" class="py-10">
        <section id="issues-section" class="w-11/12 mx-auto lg:w-10/12">
            <div id="status-filter" class="bg-white rounded-xl p-4 flex gap-3 mb-6">
                <button id="status-filter-all" class="btn issue-btn btn-outline active border-gray-300 hover:border-primary hover:bg-primary hover:text-white transition-all duration-300 ease-in-out" onclick="loadIssues('all')">All</button>
                <button id="status-filter-open" class="btn issue-btn btn-outline border-gray-300 hover:border-primary hover:bg-primary hover:text-white transition-all duration-300 ease-in-out" onclick="loadIssues('open')">Open</button>
                <button id="status-filter-closed" class="btn issue-btn btn-outline border-gray-300 hover:border-primary hover:bg-primary hover:text-white transition-all duration-300 ease-in-out" onclick="loadIssues('closed')">Closed</button>
            </div>
            <div id="issues-container" class="border border-gray-300 rounded-xl">
                <div class="issues-header bg-white rounded-t-xl flex justify-between items-center p-4 mb-6">
                    <div class="issues-title flex items-center gap-3">
                        <div class="w-[50px] h-[50px] rounded-full bg-purple-200 flex justify-center items-center">
                            <img src="./assets/images/Aperture.png" class="w-8 h-8 block" alt="">
                        </div>
                        <div>
                            <h2 id="counted-issues" class="text-xl font-semibold">
                                <!-- Issue Counted Number  -->
                            </h2>
                            <p class="text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="issues-status-legend flex gap-3">
                        <div class="font-medium flex items-center">
                            <span class="w-3 h-3 bg-green-600 rounded-full inline-block mr-2"></span>
                            Open
                        </div>
                        <div class="font-medium flex items-center">
                            <span class="w-3 h-3 bg-purple-600 rounded-full inline-block mr-2"></span>
                            closed
                        </div>
                    </div>
                </div>
                <div id="issue-spinner" class="hidden justify-center items-center py-10">
                    <span class="loading loading-bars loading-xl"></span>
                </div>
                <div id="issue-list" class="issues-grid grid grid-cols-1 gap-4 md:grid-cols-3 lg:grid-cols-4 p-4">
                    <!-- Data Load from Main Js -->
                </div>
            </div>
        </section>


        <section id="modal-section" class="py-10">
            <!-- Open the modal using ID.showModal() method -->
            <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
            <dialog id="issue_modal" class="modal modal-body sm:modal-middle">
                <div class="modal-box">
                    <div id="details-container" class="inner-box border border-gray-200 rounded-xl p-5 space-y-5">
                        <!-- Modal content -->
                        
                    </div>
                    <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary">Close</button>
                    </form>
                    </div>
                </div>
            </dialog>
        </section>
    </main>

    <footer class="bg-white">
        <div class="navbar w-11/12 lg:w-10/12 mx-auto">
            <div class="navbar-start">
                <a href="/index.html" class="flex items-center gap-1">
                    <img class="max-h-9" src="./assets/images/github-logo.png" alt="">
                    <span class="text-2xl font-semibold hidden lg:block">GitHub Issues Tracker</span>
                </a>
            </div>
            <div id="search-box" class="min-w-[300px] text-center hidden md:block">
                <label class="input input-bordered flex items-center gap-2">
                    <input class="input-search" type="search" required placeholder="Search issues..." />
                    <button class="btn-search cursor-pointer"><i class="fa-solid fa-magnifying-glass"></i></button>
                </label>
            </div>
            <div class="navbar-end">
                <a href="#" class="btn btn-primary">+ New Issue</a>
            </div>
        </div>
    </footer>




    <script src="./assets/js/main.js"></script>
</body>
</html>
